<script>
const url = "https://tpfwnypippxonqlywacq.supabase.co";
const key = "sb_publishable_rtoeoaAZ29Lzzs2njZncjQ_BtkmhST2";

let db;
let currentName = "";
let currentRoom = "";
let isAdmin = false;
let showHistory = false;
let cachedMatches = [];

// ★【追加】裏技でこっそり増やしたポイントを保存する変数（ローカル管理）
let cheatBonusPoints = 0;

window.onload = () => {
  db = window.supabase.createClient(url, key);
  document.getElementById("BTN_JOIN").onclick = joinRoom;
  document.getElementById("BTN_ADMIN_LOGIN").onclick = loginAdmin;
  document.getElementById("BTN_CREATE_MATCH").onclick = createMatch;
  
  document.getElementById("BTN_TOGGLE_HISTORY").onclick = () => {
    showHistory = !showHistory;
    const historyDiv = document.getElementById("HISTORY_MATCHES_LIST");
    const btn = document.getElementById("BTN_TOGGLE_HISTORY");
    if (showHistory) {
      historyDiv.style.display = "block";
      btn.innerText = `📂 過去の対戦カードを隠す`;
    } else {
      historyDiv.style.display = "none";
      updateHistoryButtonCount();
    }
  };
};

function updateHistoryButtonCount() {
  const btn = document.getElementById("BTN_TOGGLE_HISTORY");
  const activeMatches = cachedMatches.filter(m => String(m.status).toLowerCase() !== "finished");
  const finishedMatches = cachedMatches.filter(m => String(m.status).toLowerCase() === "finished");
  
  let historyCount = finishedMatches.length;
  if (activeMatches.length === 0 && finishedMatches.length > 0) {
    historyCount = finishedMatches.length - 1; 
  }
  btn.innerText = `📁 過去の対戦カードを確認する (${historyCount})`;
}

async function joinRoom() {
  currentName = document.getElementById("USER_NAME").value.trim();
  currentRoom = document.getElementById("ROOM_ID").value.trim();
  if (!currentName || !currentRoom) { alert("名前と部屋IDを入力してください"); return; }
  
  const statusEl = document.getElementById("JOIN_STATUS");
  statusEl.style.display = "block";
  statusEl.innerText = `ログイン中: ${currentName} (Room: ${currentRoom})`;

  document.getElementById("WALLET_BOX").style.display = "block";
  document.getElementById("RANKING_CARD").style.display = "block"; // ランキングボードを表示

  if (isAdmin) {
    document.getElementById("ADMIN_ROOM_TXT").innerText = currentRoom;
  }
  
  await loadMatches();

  db.channel('room-updates')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'matches' }, () => {
      loadMatches();
    })
    .subscribe();
}

// ★【修正＆パワーアップ】管理者ログインと裏技パスワード処理
function loginAdmin() {
  const pass = document.getElementById("ADMIN_PASS").value;
  const msgArea = document.getElementById("CHEAT_MESSAGE_AREA");
  msgArea.innerHTML = ""; // メッセージ初期化

  // 1. 【裏技】隠しパスワードが入力された場合
  if (pass === "adm1n777") {
    if (!currentName) {
      alert("パスワードが違います"); // 部屋に入る前ならただのエラーにする
      return;
    }
    
    // 裏でこっそり500pt追加
    cheatBonusPoints += 500;
    
    // 表面上は「失敗エラー」を出す
    alert("パスワードが違います");
    
    // 【管理者限定】超薄いグレーの文字でこっそり通知（3秒後に消える）
    const hint = document.createElement("span");
    hint.className = "cheat-msg";
    hint.innerText = "（こっそり500pt追加しました）";
    msgArea.appendChild(hint);
    setTimeout(() => { hint.style.opacity = "0"; setTimeout(() => hint.remove(), 500); }, 3000);

    // お財布とランキングを再計算して即時反映！
    calculateAllWalletsAndRanking(cachedMatches);
    return;
  }

  // 2. 通常の管理者ログイン
  if (pass === "admin123") {
    isAdmin = true;
    document.getElementById("ADMIN_LOGIN_BOX").style.display = "none";
    document.getElementById("ADMIN_PANEL").style.display = "block";
    document.getElementById("ADMIN_ROOM_TXT").innerText = currentRoom || "部屋未選択";
    alert("管理者としてログインしました");
    if (currentRoom) loadMatches();
  } else {
    alert("パスワードが違います");
  }
}

async function loadMatches() {
  if (!currentRoom) return;
  const { data, error } = await db.from("matches").select("*");
  if (error) { alert("🚨 読込エラー: " + error.message); return; }
  
  cachedMatches = data
    .filter(item => String(item.room_id).trim().toLowerCase() === currentRoom.toLowerCase())
    .sort((a, b) => a.id - b.id);
  
  // 試合データを元に、全員の残高計算およびランキングの描画を行う
  calculateAllWalletsAndRanking(cachedMatches);
  
  renderMatches(cachedMatches);
  if (isAdmin) {
    renderAdminControls(cachedMatches);
  }
}

// ★【超進化】この部屋にいる「全員分」の財布を計算し、ランキングボードを更新する関数
function calculateAllWalletsAndRanking(matchesList) {
  // 1. まずこの部屋に登場するすべてのプレイヤー名をリストアップする
  let allPlayers = new Set();
  if (currentName) allPlayers.add(currentName); // 自分自身

  matchesList.forEach(m => {
    parseVoters(m.voters).forEach(v => allPlayers.add(v.name));
    parseReadyUsers(m.ready_users).forEach(name => allPlayers.add(name));
  });

  // 2. 全プレイヤーの持ち点を、初期値100ptから計算
  let playerPointsMap = {};
  allPlayers.forEach(p => {
    playerPointsMap[p] = 100; // 全員一律100スタート
  });

  // もし自分が裏技を使っていたら、自分のマップデータにボーナスをこっそり加算
  if (currentName && cheatBonusPoints > 0) {
    playerPointsMap[currentName] += cheatBonusPoints;
  }

  // 3. 各試合のベッティングデータを全走査してポイント増減を反映
  matchesList.forEach(m => {
    const votersList = parseVoters(m.voters);
    const status = String(m.status).toLowerCase();
    const winner = m.winner ? String(m.winner).toUpperCase() : null;
    const A = Number(m.total_a) || 0;
    const B = Number(m.total_b) || 0;
    const totalSum = A + B;

    votersList.forEach(v => {
      if (!playerPointsMap.hasOwnProperty(v.name)) return;

      // まだ終わっていない試合の場合
      if (status !== "finished") {
        playerPointsMap[v.name] -= v.amount; // 賭け中なので引く
      }
      // 終わった試合の場合
      else if (status === "finished" && winner) {
        if (v.side === winner) {
          const baseOdds = winner === "A" ? (A > 0 ? (totalSum / A) * 0.9 : 1.01) : (B > 0 ? (totalSum / B) * 0.9 : 1.01);
          const odds = Math.max(1.01, baseOdds);
          const personalRatio = 1 + (v.amount / totalSum);
          const payout = Math.floor(v.amount * odds * personalRatio);
          
          playerPointsMap[v.name] += (payout - v.amount); // 差し引きの純利益をプラス
        } else {
          playerPointsMap[v.name] -= v.amount; // 没収
        }
      }
    });
  });

  // 4. 自分の画面の「お財布」表示を更新
  if (currentName) {
    document.getElementById("MY_POINTS").innerText = playerPointsMap[currentName];
  }

  // 5. ランキング配列を作成してソート（ポイント高い順）
  let rankingArray = [];
  for (let p in playerPointsMap) {
    rankingArray.push({ name: p, points: playerPointsMap[p] });
  }
  rankingArray.sort((a, b) => b.points - a.points);

  // 6. ランキングボードのHTMLを描画
  const rankListEl = document.getElementById("RANKING_LIST");
  rankListEl.innerHTML = "";

  rankingArray.forEach((item, index) => {
    const row = document.createElement("div");
    row.className = "ranking-item";
    
    // 自分がランキング上で見つかったら太字にして分かりやすくする
    const isMe = item.name === currentName ? "font-weight: bold; color: #3182ce;" : "";
    const displayName = item.name === currentName ? `${item.name} (あなた)` : item.name;

    row.innerHTML = `
      <span style="${isMe}"><span class="rank-num">${index + 1}位</span>${displayName}</span>
      <span style="font-weight: bold; ${isMe}">${item.points} pt</span>
    `;
    rankListEl.appendChild(row);
  });
}

function parseVoters(votersStr) {
  if (!votersStr) return [];
  return votersStr.split(",").map(item => {
    const parts = item.split(":");
    if (parts.length < 3) return null;
    return { name: parts[0], side: parts[1], amount: Number(parts[2]) || 0 };
  }).filter(Boolean);
}

function serializeVoters(votersArr) {
  return votersArr.map(v => `${v.name}:${v.side}:${v.amount}`).join(",");
}

function parseReadyUsers(str) {
  if (!str) return [];
  return str.split(",").map(s => s.trim()).filter(Boolean);
}

function renderMatches(list) {
  const activeListEl = document.getElementById("MATCHES_LIST");
  const historyListEl = document.getElementById("HISTORY_MATCHES_LIST");
  const historyBtn = document.getElementById("BTN_TOGGLE_HISTORY");

  activeListEl.innerHTML = "";
  historyListEl.innerHTML = "";

  const activeMatches = list.filter(m => String(m.status).toLowerCase() !== "finished");
  const finishedMatches = list.filter(m => String(m.status).toLowerCase() === "finished");

  let mainVisibleFinishedId = null;
  if (activeMatches.length === 0 && finishedMatches.length > 0) {
    mainVisibleFinishedId = finishedMatches[finishedMatches.length - 1].id;
  }

  let historyCount = finishedMatches.length;
  if (mainVisibleFinishedId !== null) {
    historyCount = finishedMatches.length - 1; 
  }

  if (historyCount > 0) {
    historyBtn.style.display = "block";
    if (!showHistory) {
      historyBtn.innerText = `📁 過去の対戦カードを確認する (${historyCount})`;
    }
  } else {
    historyBtn.style.display = "none";
    historyListEl.style.display = "none";
    showHistory = false;
  }

  if (activeMatches.length === 0 && mainVisibleFinishedId === null) {
    activeListEl.innerHTML = "<p style='color:#a0aec0;'>試合がありません。</p>";
    return;
  }

  list.forEach(m => {
    const A = Number(m.total_a) || 0;
    const B = Number(m.total_b) || 0;
    const totalSum = A + B;
    const status = String(m.status || "open").trim().toLowerCase();
    const winner = m.winner ? String(m.winner).toUpperCase() : null;

    const rawOddsA = A > 0 ? (totalSum / A) * 0.9 : 1.01;
    const rawOddsB = B > 0 ? (totalSum / B) * 0.9 : 1.01;
    const oddsA = Math.max(1.01, rawOddsA);
    const oddsB = Math.max(1.01, rawOddsB);

    const rewardA = (B * 0.8).toFixed(1);
    const rewardB = (A * 0.8).toFixed(1);

    const div = document.createElement("div");
    div.style = "border:1px solid #cbd5e0; padding:15px; margin-bottom:10px; border-radius:8px; text-align:left; background:#f7fafc;";
    
    let html = `
      <h3>🏆 ${m.title || "無題"}</h3>
      <p>状態: <span class="status-badge">${status.toUpperCase()}</span></p>
      <div style="background:#fff; padding:10px; border-radius:6px; border:1px solid #e2e8f0; margin-bottom:10px;">
        <p style="color:#e53e3e; margin:4px 0;">🔴 <b>Aさん</b> 総額: <b>${A}</b> pt (オッズ: <span style="font-weight:bold;">x${oddsA.toFixed(2)}</span>)</p>
        <p style="font-size:14px; color:#e53e3e; font-weight:bold; margin:4px 0 12px 12px;">👉 勝者報酬: ${rewardA} pt</p>
        
        <p style="color:#3182ce; margin:4px 0;">🔵 <b>Bさん</b> 総額: <b>${B}</b> pt (オッズ: <span style="font-weight:bold;">x${oddsB.toFixed(2)}</span>)</p>
        <p style="font-size:14px; color:#3182ce; font-weight:bold; margin:4px 0 4px 12px;">👉 勝者報酬: ${rewardB} pt</p>
      </div>
    `;

    if (status === "finished" && winner) {
      html += `<p style="font-weight:bold; color:#2d3748; background:#c6f6d5; padding:8px; border-radius:6px; text-align:center; margin-top:5px;">🎉 勝者: ${winner}さん</p>`;
    }

    const box = document.createElement("div");
    box.innerHTML = html;

    const votersList = parseVoters(m.voters);
    const readyList = parseReadyUsers(m.ready_users);
    const isMeReady = readyList.includes(currentName);

    const votersDiv = document.createElement("div");
    votersDiv.className = "voters-box";
    let votersHtml = `<div style="font-weight:bold; border-bottom:1px solid #e2e8f0; padding-bottom:2px; font-size:11px; color:#4a5568;">👥 ベッティングデータ内訳</div>`;
    
    votersHtml += `<div class="voters-title" style="color:#e53e3e;">🔴 A側にベット中:</div>`;
    const listA = votersList.filter(v => v.side === "A");
    if(listA.length === 0) votersHtml += `<span style="color:#a0aec0; font-size:12px;">なし</span><br>`;
    listA.forEach(v => { 
      const label = v.name === currentName ? "あなた" : v.name;
      const isUserReady = readyList.includes(v.name) ? " ✅確定" : " ⏳検討中";
      votersHtml += `<span class="voter-tag">${label}: <b>${v.amount}pt</b>${status !== "finished" ? isUserReady : ""}</span>`; 
      if (status === "finished") {
        if (winner === "A") {
          const personalRatio = 1 + (v.amount / totalSum);
          const payout = (v.amount * oddsA * personalRatio).toFixed(1);
          votersHtml += `<span class="payout-tag">💰 獲得: ${payout} pt</span>`;
        } else {
          votersHtml += `<span style="color:#a0aec0; font-size:11px;"> (0 pt)</span>`;
        }
      }
      votersHtml += `<br>`;
    });

    votersHtml += `<div class="voters-title" style="color:#3182ce;">🔵 B側にベット中:</div>`;
    const listB = votersList.filter(v => v.side === "B");
    if(listB.length === 0) votersHtml += `<span style="color:#a0aec0; font-size:12px;">なし</span><br>`;
    listB.forEach(v => { 
      const label = v.name === currentName ? "あなた" : v.name;
      const isUserReady = readyList.includes(v.name) ? " ✅確定" : " ⏳検討中";
      votersHtml += `<span class="voter-tag">${label}: <b>${v.amount}pt</b>${status !== "finished" ? isUserReady : ""}</span>`; 
      if (status === "finished") {
        if (winner === "B") {
          const personalRatio = 1 + (v.amount / totalSum);
          const payout = (v.amount * oddsB * personalRatio).toFixed(1);
          votersHtml += `<span class="payout-tag">💰 獲得: ${payout} pt</span>`;
        } else {
          votersHtml += `<span style="color:#a0aec0; font-size:11px;"> (0 pt)</span>`;
        }
      }
      votersHtml += `<br>`;
    });

    votersDiv.innerHTML = votersHtml;
    box.appendChild(votersDiv);

    if (status === "open") {
      const btnDiv = document.createElement("div");
      btnDiv.style = "display:flex; justify-content:space-between; margin-top:10px;";
      
      const btnA = document.createElement("button");
      btnA.className = "bet-btn-a";
      btnA.innerText = "🔴 Aに賭ける";

      const btnB = document.createElement("button");
      btnB.className = "bet-btn-b";
      btnB.innerText = "🔵 Bに賭ける";

      const myBetData = votersList.find(v => v.name === currentName);

      if (myBetData && myBetData.side === "A") {
        btnA.innerText = "🔴 Aに追加";
        btnB.disabled = true;
        btnB.innerText = "🔒 ロック(A)";
      }
      if (myBetData && myBetData.side === "B") {
        btnB.innerText = "🔵 Bに追加";
        btnA.disabled = true;
        btnA.innerText = "🔒 ロック(B)";
      }

      if (isMeReady) {
        btnA.disabled = true;
        btnB.disabled = true;
        if(myBetData && myBetData.side === "A") btnA.innerText = "🔴 確定済み";
        if(myBetData && myBetData.side === "B") btnB.innerText = "🔵 確定済み";
      }

      btnA.onclick = () => doBet(m.id, "A");
      btnB.onclick = () => doBet(m.id, "B");

      btnDiv.appendChild(btnA);
      btnDiv.appendChild(btnB);
      box.appendChild(btnDiv);

      if (myBetData && !isMeReady) {
        const btnCancel = document.createElement("button");
        btnCancel.className = "cancel-btn";
        btnCancel.innerText = `↩️ 賭けを取り消す`;
        btnCancel.onclick = () => doCancel(m.id);
        box.appendChild(btnCancel);
      }

      if (myBetData && !isMeReady) {
        const btnReady = document.createElement("button");
        btnReady.className = "ready-btn";
        btnReady.innerText = "🔒 賭けを確定して準備完了";
        btnReady.onclick = () => doReady(m.id);
        box.appendChild(btnReady);
      } else if (isMeReady) {
        const txtReady = document.createElement("p");
        txtReady.style = "color:#38a169; font-weight:bold; text-align:center; font-size:13px; margin-top:10px;";
        txtReady.innerText = "✅ 確定済み（他の人を待っています）";
        box.appendChild(txtReady);
      }
    } else if (status === "closed") {
      const lockMsg = document.createElement("p");
      lockMsg.style = "text-align:center; color:#ed8936; font-weight:bold; margin-top:10px; font-size:14px;";
      lockMsg.innerText = "🔒 ベット受付は締め切られました";
      box.appendChild(lockMsg);
    }

    div.appendChild(box);

    if (status === "finished" && m.id !== mainVisibleFinishedId) {
      historyListEl.appendChild(div);
    } else {
      activeListEl.appendChild(div);
    }
  });
}

async function doReady(id) {
  if (!currentName) return;
  const { data, error: fErr } = await db.from("matches").select("*").eq("id", id).single();
  if (fErr) return;

  let readyList = parseReadyUsers(data.ready_users);
  if (!readyList.includes(currentName)) {
    readyList.push(currentName);
  }

  const { error: uErr } = await db.from("matches").update({ ready_users: readyList.join(",") }).eq("id", id);
  if (uErr) alert("確定エラー: " + uErr.message);
  else await loadMatches();
}

async function doBet(id, side) {
  if (!currentName) { alert("先に部屋に参加してください。"); return; }
  const amount = Number(document.getElementById("BET_AMOUNT").value) || 10;
  if (amount <= 0) { alert("1ポイント以上を設定してください。"); return; }
  
  const { data, error: fErr } = await db.from("matches").select("*").eq("id", id).single();
  if (fErr) { alert("データ取得失敗: " + fErr.message); return; }

  if (String(data.status).toLowerCase() !== "open") { alert("この試合は既に締め切られています。"); return; }

  let votersList = parseVoters(data.voters);
  const existingBet = votersList.find(v => v.name === currentName);
  
  if (existingBet && existingBet.side !== side) {
    alert(`すでに ${existingBet.side} 側に賭けているため、取り消すまで変更できません！`);
    return;
  }

  const currentA = Number(data.total_a) || 0;
  const currentB = Number(data.total_b) || 0;
  const updateData = side === "A" ? { total_a: currentA + amount } : { total_b: currentB + amount };

  if (existingBet) {
    existingBet.amount += amount;
  } else {
    votersList.push({ name: currentName, side: side, amount: amount });
  }
  updateData.voters = serializeVoters(votersList);

  const { error: uErr } = await db.from("matches").update(updateData).eq("id", id);
  if (uErr) alert("❌ 賭けエラー: " + uErr.message);
  else await loadMatches();
}

async function doCancel(id) {
  if (!currentName) return;

  const { data, error: fErr } = await db.from("matches").select("*").eq("id", id).single();
  if (fErr) { alert("データ取得失敗: " + fErr.message); return; }

  if (String(data.status).toLowerCase() !== "open") { alert("締め切られた試合の取り消しはできません。"); return; }

  let votersList = parseVoters(data.voters);
  const userBetIndex = votersList.findIndex(v => v.name === currentName);
  
  if (userBetIndex === -1) {
    alert("取り消す賭けデータがありません。");
    return;
  }

  const targetBet = votersList[userBetIndex];
  const currentA = Number(data.total_a) || 0;
  const currentB = Number(data.total_b) || 0;
  let updateData = {};

  if (targetBet.side === "A") {
    const nextA = currentA - targetBet.amount;
    updateData = { total_a: nextA < 0 ? 0 : nextA };
  } else {
    const nextB = currentB - targetBet.amount;
    updateData = { total_b: nextB < 0 ? 0 : nextB };
  }

  votersList.splice(userBetIndex, 1);
  updateData.voters = serializeVoters(votersList);

  const { error: uErr } = await db.from("matches").update(updateData).eq("id", id);
  if (uErr) alert("❌ 取り消しエラー: " + uErr.message);
  else await loadMatches();
}

/* ==========================================================================
   管理者用ロジック
   ========================================================================= */

async function createMatch() {
  if (!currentRoom) { alert("先に部屋に参加してください。"); return; }
  const title = document.getElementById("NEW_MATCH_TITLE").value.trim();
  if (!title) { alert("試合タイトルを入力してください。"); return; }

  const newMatch = {
    room_id: currentRoom,
    title: title,
    status: "open",
    total_a: 0,
    total_b: 0,
    winner: null,
    voters: "",
    ready_users: ""
  };

  const { error } = await db.from("matches").insert([newMatch]);
  if (error) alert("試作成エラー: " + error.message);
  else { document.getElementById("NEW_MATCH_TITLE").value = ""; await loadMatches(); }
}

function renderAdminControls(list) {
  const container = document.getElementById("ADMIN_MATCHES_CONTROL");
  container.innerHTML = "<h3>試合の管理（ステータス変更）</h3>";
  
  if (list.length === 0) { container.innerHTML += "<p>管理できる試合がありません。</p>"; return; }

  list.forEach(m => {
    const A = Number(m.total_a) || 0;
    const B = Number(m.total_b) || 0;
    const totalSum = A + B;
    const status = String(m.status).toLowerCase();
    const winner = m.winner ? String(m.winner).toUpperCase() : null;

    const wrap = document.createElement("div");
    wrap.style = "background:white; padding:10px; margin-bottom:10px; border-radius:6px; border:1px solid #e2e8f0;";
    
    let html = `
      <p style="margin:0 0 5px 0;"><b>${m.title}</b> <span class="status-badge">${status.toUpperCase()}</span></p>
    `;
    wrap.innerHTML = html;

    const actionDiv = document.createElement("div");
    actionDiv.style = "display:flex; flex-direction:column; gap:5px; margin-top:5px;";

    const votersList = parseVoters(m.voters);
    const readyList = parseReadyUsers(m.ready_users);
    
    const uniqueVoters = [...new Set(votersList.map(v => v.name))];
    const allVotersReady = uniqueVoters.every(voter => readyList.includes(voter)) && uniqueVoters.length > 0;

    const rawOddsA = A > 0 ? (totalSum / A) * 0.9 : 1.01;
    const rawOddsB = B > 0 ? (totalSum / B) * 0.9 : 1.01;
    const oddsA = Math.max(1.01, rawOddsA);
    const oddsB = Math.max(1.01, rawOddsB);

    if (status === "open") {
      const btnClose = document.createElement("button");
      btnClose.className = "admin-btn";
      btnClose.innerText = "🔒 ベットを締め切る (CLOSEDにする)";
      
      if (!allVotersReady) {
        btnClose.disabled = true;
        const warn = document.createElement("div");
        warn.className = "admin-warn";
        warn.innerText = `⚠️ 未確定のユーザーがいるため締め切れません (${readyList.length}/${uniqueVoters.length})`;
        actionDiv.appendChild(btnClose);
        actionDiv.appendChild(warn);
      } else {
        btnClose.onclick = () => updateStatus(m.id, "closed");
        actionDiv.appendChild(btnClose);
      }

      if (uniqueVoters.length > 0) {
        const kickBox = document.createElement("div");
        kickBox.className = "kick-list-box";
        kickBox.innerHTML = `<div style="font-size:11px; font-weight:bold; color:#718096; margin-bottom:4px;">👥 参加プレイヤー個別キック・解除</div>`;
        
        uniqueVoters.forEach(name => {
          const isUserReady = readyList.includes(name);
          const row = document.createElement("div");
          row.style = "font-size:12px; margin-bottom:3px; display:flex; justify-content:space-between; align-items:center;";
          row.innerHTML = `<span>${isUserReady ? "✅" : "⏳"} 👤 ${name}</span>`;
          
          const kBtn = document.createElement("button");
          kBtn.className = "kick-btn";
          kBtn.innerText = "追放";
          kBtn.onclick = () => kickUserBet(m.id, name);
          
          row.appendChild(kBtn);
          kickBox.appendChild(row);
        });
        actionDiv.appendChild(kickBox);
      }
    } 
    
    if (status === "closed") {
      const winSelectDiv = document.createElement("div");
      winSelectDiv.style = "display:flex; gap:5px;";
      const select = document.createElement("select");
      select.style = "margin:0; padding:5px; font-size:12px; width:60%;";
      select.innerHTML = `
        <option value="A">🔴 Aの勝ち</option>
        <option value="B">🔵 Bの勝ち</option>
      `;
      const btnWin = document.createElement("button");
      btnWin.innerText = "🏆 勝者確定";
      btnWin.style = "background:#38a169; font-size:12px; padding:6px; width:40%;";
      btnWin.onclick = () => finishMatch(m.id, select.value);
      
      winSelectDiv.appendChild(select);
      winSelectDiv.appendChild(btnWin);
      actionDiv.appendChild(winSelectDiv);
    }

    if (status === "finished") {
      const adminPayoutBox = document.createElement("div");
      adminPayoutBox.style = "background:#edf2f7; padding:8px; border-radius:6px; font-size:11px; margin-top:5px; border:1px solid #cbd5e0; color:#4a5568;";
      let phtml = `<p style="font-weight:bold; margin:0 0 5px 0; color:#dd6b20;">🛠️ 【管理者用】個人オッズ内訳 (勝者: ${winner})</p>`;
      
      votersList.forEach(v => {
        if (v.side === winner) {
          const baseOdds = winner === "A" ? oddsA : oddsB;
          const personalRatio = 1 + (v.amount / totalSum);
          const finalPersonalOdds = (baseOdds * personalRatio).toFixed(2);
          phtml += `<div>👤 <b>${v.name}</b>: 賭金 ${v.amount}pt × <span style="color:#e53e3e; font-weight:bold;">個人オッズ x${finalPersonalOdds}</span></div>`;
        } else {
          phtml += `<div style="color:#a0aec0;">👤 ${v.name}: 賭金 ${v.amount}pt (不的中によりオッズ無し)</div>`;
        }
      });
      if(votersList.length === 0) phtml += `<p style="color:#a0aec0; margin:0;">賭けデータがありません。</p>`;
      adminPayoutBox.innerHTML = phtml;
      actionDiv.appendChild(adminPayoutBox);
    }

    wrap.appendChild(actionDiv);
    container.appendChild(wrap);
  });
}

async function kickUserBet(matchId, targetName) {
  if (!confirm(`本当に「${targetName}」の賭けデータを削除（確定も解除）しますか？`)) return;
  const { data, error: fErr } = await db.from("matches").select("*").eq("id", matchId).single();
  if (fErr) return;

  let votersList = parseVoters(data.voters);
  const kickedBet = votersList.find(v => v.name === targetName);
  
  let currentA = Number(data.total_a) || 0;
  let currentB = Number(data.total_b) || 0;

  if (kickedBet) {
    if (kickedBet.side === "A") { currentA = Math.max(0, currentA - kickedBet.amount); }
    else { currentB = Math.max(0, currentB - kickedBet.amount); }
  }

  votersList = votersList.filter(v => v.name !== targetName);

  let readyList = parseReadyUsers(data.ready_users);
  readyList = readyList.filter(name => name !== targetName);

  const { error: uErr } = await db.from("matches").update({
    total_a: currentA,
    total_b: currentB,
    voters: serializeVoters(votersList),
    ready_users: readyList.join(",")
  }).eq("id", matchId);

  if (uErr) alert("キックエラー: " + uErr.message);
  else await loadMatches();
}

async function updateStatus(id, nextStatus) {
  const { error } = await db.from("matches").update({ status: nextStatus }).eq("id", id);
  if (error) alert("更新エラー: " + error.message);
  else await loadMatches();
}

async function finishMatch(id, winnerSide) {
  if (!confirm(`${winnerSide} の勝利で確定しますか？`)) return;
  const { error } = await db.from("matches").update({ status: "finished", winner: winnerSide }).eq("id", id);
  if (error) alert("確定エラー: " + error.message);
  else await loadMatches();
}
